<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auth Debug</title>
<style>
  body { background: #0a0a0a; color: #e0e0e0; font-family: monospace; padding: 24px; }
  h2 { color: #a99fff; margin-bottom: 16px; }
  button { background: #7b6cff; color: #fff; border: none; padding: 8px 16px; margin: 4px; cursor: pointer; border-radius: 4px; font-family: monospace; }
  button:hover { opacity: 0.85; }
  pre { background: #111; border: 1px solid #333; padding: 16px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; margin-top: 12px; font-size: 12px; }
  .ok { color: #3dffa0; } .err { color: #ff5c5c; } .warn { color: #ffb347; }
  input { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 6px 10px; font-family: monospace; border-radius: 4px; width: 320px; margin: 4px; }
  label { font-size: 11px; color: #666; display: block; margin-top: 8px; }
  hr { border-color: #222; margin: 16px 0; }
</style>
</head>
<body>
<h2>🔍 Auth Debug v2</h2>

<div>
  <button onclick="checkSession()">1. Check stored session</button>
  <button onclick="testVerify()">2. Test verifySession</button>
  <button onclick="clearAndShow()">3. Clear session</button>
</div>
<hr>
<div>
  <label>Test full login + redirect simulation:</label>
  <input id="test-email" placeholder="email" value="Thomaslancheros06@gmail.com">
  <input id="test-pw" placeholder="password" type="password">
  <button onclick="testLogin()">Test login (save only)</button>
  <button onclick="testLoginAndGo()">Test login + redirect to /home/index.html</button>
</div>
<hr>
<div>
  <label>Direct navigate test (checks if session survives navigation):</label>
  <button onclick="checkThenGo()">Check session then go to /home/index.html</button>
  <button onclick="goHomeNow()">Go to /home/index.html right now</button>
</div>

<pre id="out">Waiting…</pre>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbxTvgL1RopUmsYkA3okiWVeZcsuV0lMo6eOEJ7RwC1nQi2CJlBLj2QHBt18ha7YG_3k/exec';
const KEY = 'edgeform_crm_session';

function out(data, cls) {
  const el = document.getElementById('out');
  el.className = cls || 'ok';
  el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
}

async function gas(payload) {
  const url = GAS + '?payload=' + encodeURIComponent(JSON.stringify(payload));
  const r = await fetch(url);
  return r.json();
}

function checkSession() {
  const raw = localStorage.getItem(KEY);
  if (!raw) { out('No session in localStorage', 'err'); return; }
  try {
    const s = JSON.parse(raw);
    out({ stored_session: s, token_preview: s.token?.substring(0,20) + '…' }, 'ok');
  } catch(e) { out('Parse error: ' + e.message, 'err'); }
}

async function testVerify() {
  const raw = localStorage.getItem(KEY);
  if (!raw) { out('No session stored', 'err'); return; }
  const s = JSON.parse(raw);
  out('Calling verifySession…', 'warn');
  try {
    const r = await gas({ action: 'verifySession', token: s.token });
    out(r, r.ok ? 'ok' : 'err');
  } catch(e) { out('FETCH ERROR: ' + e.message, 'err'); }
}

async function testLogin() {
  const email = document.getElementById('test-email').value.trim();
  const pw = document.getElementById('test-pw').value;
  out('Logging in…', 'warn');
  try {
    const r = await gas({ action: 'login', email, password: pw });
    if (r.ok) {
      localStorage.setItem(KEY, JSON.stringify({ token: r.token, email, name: r.name }));
      out({ ...r, note: '✓ Session saved. Now click "Test verifySession" to confirm.' }, 'ok');
    } else {
      out(r, 'err');
    }
  } catch(e) { out('FETCH ERROR: ' + e.message, 'err'); }
}

async function testLoginAndGo() {
  const email = document.getElementById('test-email').value.trim();
  const pw = document.getElementById('test-pw').value;
  out('Logging in then redirecting…', 'warn');
  try {
    const r = await gas({ action: 'login', email, password: pw });
    if (r.ok) {
      localStorage.setItem(KEY, JSON.stringify({ token: r.token, email, name: r.name }));
      // Confirm it's written
      const check = localStorage.getItem(KEY);
      out('Session written: ' + (check ? 'YES' : 'NO') + '\nRedirecting in 1 second…', 'warn');
      setTimeout(() => { window.location.href = '/home/index.html'; }, 1000);
    } else {
      out(r, 'err');
    }
  } catch(e) { out('FETCH ERROR: ' + e.message, 'err'); }
}

function checkThenGo() {
  const raw = localStorage.getItem(KEY);
  if (!raw) { out('No session — log in first', 'err'); return; }
  out('Session exists, navigating to /home/index.html now…', 'warn');
  setTimeout(() => { window.location.href = '/home/index.html'; }, 500);
}

function goHomeNow() {
  window.location.href = '/home/index.html';
}

function clearAndShow() {
  const raw = localStorage.getItem(KEY);
  localStorage.removeItem(KEY);
  out({ cleared: true, was: raw ? JSON.parse(raw) : null }, 'warn');
}

// Auto-check on load
out('Page loaded at: ' + window.location.href + '\nOrigin: ' + window.location.origin, 'warn');
checkSession();
</script>
</body>
</html>
